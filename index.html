<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary meta -->
    <title>dilbar — Relationship Analyzer</title>
    <meta name="description" content="dilbar reads your WhatsApp chat and reveals the love, patterns, fights, and what they mean for your bond." />
    <meta name="theme-color" content="#6b1a2a" />

    <!-- Open Graph (social share preview) -->
    <meta property="og:title"       content="dilbar — Relationship Analyzer" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Tabler Icons (thin line icons used throughout the app) -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"
    />

    <!-- Fonts are loaded via index.css @import -->
  </head>
  <body>
    <!-- React mounts here -->
    <div id="root"></div>

    <!-- Vite injects the bundled JS here at build time -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
